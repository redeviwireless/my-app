name: Build EXE
on:
  push:
    branches: [ main ]
jobs:
  build:
    runs-on: windows-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 18
      - name: Install dependencies
        run: npm install
      - name: Build EXE
        run: npm run build
      - name: Upload EXE
        uses: actions/upload-artifact@v4
        with:
          name: my-app-exe
          path: dist/*.exe
